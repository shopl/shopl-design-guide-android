name: Auto PR for update/icon

on:
  create:
    branches:
      - 'update/icon'
  push:
    branches:
      - 'update/icon'

jobs:
  create_pr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout update/icon
        uses: actions/checkout@v3
        with:
          ref: update/icon
          fetch-depth: 0           # 전체 커밋 기록을 가져와서 충돌 방지

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: resource
          branch: update/icon
          title: '[자동 PR] update/icon → resource'
          body: |
            `update/icon` 브랜치에 변경사항이 감지되어 자동으로 PR을 생성합니다.
          labels: automated-pr
          log-level: debug          # (선택) 디버그 로그 출력